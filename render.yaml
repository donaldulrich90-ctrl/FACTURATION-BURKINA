# Configuration Render pour FACTURATION-BURKINA (FasoMarchés)
# https://render.com/docs/blueprint-spec
#
# Les données persistent grâce à PostgreSQL. Sans PostgreSQL, SQLite est utilisé
# et les données sont EFFACÉES à chaque déploiement (disque éphémère).

databases:
  - name: facturation-db
    plan: free

services:
  - type: web
    name: facturation-burkina
    runtime: node

    buildCommand: |
      npm install --include=dev
      npm run build
      cd server && npm install --include=dev && npm run db:generate && npx prisma db push && npx prisma db seed

    startCommand: cd server && node src/index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: facturation-db
          property: connectionString
