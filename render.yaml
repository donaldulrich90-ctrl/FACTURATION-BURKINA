# Configuration Render pour FACTURATION-BURKINA (FasoMarchés)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: facturation-burkina
    runtime: node

    buildCommand: |
      npm install
      npm run build
      cd server && npm install && npx prisma generate && npx prisma db push

    startCommand: cd server && node src/index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
