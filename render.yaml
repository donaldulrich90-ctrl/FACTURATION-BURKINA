# Configuration Render pour FACTURATION-BURKINA (FasoMarchés)
# https://render.com/docs/blueprint-spec
#
# IMPORTANT : Liez la base PostgreSQL (FACTURATION) au service via le dashboard Render
# pour que DATABASE_URL soit défini automatiquement (Add from Render).

services:
  - type: web
    name: facturation-burkina
    runtime: node

    buildCommand: |
      npm install --include=dev
      npm run build
      cd server && npm install --include=dev && npm run db:generate && npx prisma db push && npx prisma db seed

    startCommand: cd server && node src/index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
