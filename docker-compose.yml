services:
  app:
    build: .
    container_name: fasomarches
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-changez-moi-en-production-32-caracteres-min}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      # Persistance SQLite (bind mount pour pouvoir copier dev.db depuis l'hôte)
      - ./server/prisma:/app/server/prisma
      # Fichiers uploadés (DAO, archives)
      - uploads_data:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
